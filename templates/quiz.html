<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Quiz - Test Your Knowledge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='quiz.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="quiz-container">
        <header class="quiz-header">
            <h1>Phishing Knowledge Quiz</h1>
            <p>Test your ability to identify phishing attempts</p>
            
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: {{ (question_num / total_questions) * 100 }}%"></div>
            </div>
            <div class="question-counter">
                Question {{ question_num }} of {{ total_questions }}
            </div>
        </header>

        <form action="{{ url_for('submit_answer') }}" method="POST">
            <div class="question-card">
                <h2>{{ question.question }}</h2>
                <div class="options">
                    {% for option in question.options %}
                    <div class="option">
                        <input type="radio" name="answer" id="option{{ loop.index }}" value="{{ option }}" required>
                        <label for="option{{ loop.index }}" class="option-text">{{ option }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="quiz-navigation">
                <button type="submit" class="btn-primary">
                    {% if question_num == total_questions %}
                        <i class="fas fa-flag-checkered"></i> Finish Quiz
                    {% else %}
                        <i class="fas fa-arrow-right"></i> Next Question
                    {% endif %}
                </button>
            </div>
        </form>
    </div>
</body>
</html>
